    <!-- Primary Meta Tags -->
    <title>Website</title>
    <meta name="description" content="" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://website.com/" />
    <meta property="og:title" content="Website" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="https://website.com/images/image.png" />

    <!-- X (Twitter) -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://website.com/" />
    <meta property="twitter:title" content="Website" />
    <meta property="twitter:description" content="" />
    <meta property="twitter:image" content="https://website.com/images/image.png" />

    <link rel="stylesheet" href="style.css">
</head>
